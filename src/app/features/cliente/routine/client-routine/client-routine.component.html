<div class="routine-container" *ngIf="!loading">

    <mat-card *ngIf="routine" class="routine-header-card">
        <h2>💪 {{ routine.name }}</h2>

        <p class="instructor-name" *ngIf="instructorName">
            Instructor: <strong>{{ instructorName }}</strong>
        </p>
    </mat-card>

    <div *ngIf="routineDays.length > 0" class="days-grid">

        <mat-card *ngFor="let day of routineDays" class="day-card">

            <h3>📅 Día {{ day.dayNumber }}</h3>
            <p>{{ day.title }}</p>

            <!-- 🔥 EJERCICIOS -->
            <div *ngFor="let ex of day.exercises" class="exercise-row">

                <ng-container *ngIf="getExerciseById(ex.exerciseId) as exercise">

                    <div class="exercise-card" (click)="openExercisePreview(ex.exerciseId)" style="cursor: pointer;">

                        <img *ngIf="exercise.imageUrl" [src]="exercise.imageUrl" class="exercise-image">

                        <div class="exercise-info">
                            <h4>{{ exercise.name }}</h4>

                            <div class="exercise-meta">
                                <span class="badge">{{ ex.sets }} sets</span>
                                <span class="badge">{{ ex.reps }} reps</span>
                            </div>
                            <div *ngIf="lastWeights[ex.exerciseId] != null" class="last-weight">
                                Último peso: <strong>{{ lastWeights[ex.exerciseId] }} kg</strong>
                            </div>
                        </div>

                    </div>
                    <!-- 🔥 REGISTRO DE PESO -->
                    <div class="weight-log">

                        <input type="number" min="0" placeholder="Peso (kg)" [(ngModel)]="ex.currentWeight"
                            class="weight-input" />

                        <button mat-stroked-button color="primary" (click)="saveWeight(day, ex, exercise)">
                            Guardar
                        </button>

                    </div>

                </ng-container>

            </div>

            <!-- 🔥 AQUÍ VA EL BOTÓN (FUERA DEL LOOP DE EJERCICIOS) -->
            <div class="complete-workout">

                <button mat-raised-button [color]="day.completedToday ? 'accent' : 'primary'" class="complete-btn"
                    [disabled]="day.completedToday" (click)="completeWorkout(day)">

                    <mat-icon>
                        {{ day.completedToday ? 'check_circle' : 'check_circle_outline' }}
                    </mat-icon>

                    {{ day.completedToday ? 'Entrenamiento completado' : 'Finalizar entrenamiento' }}

                </button>

            </div>

        </mat-card>

    </div>

    <mat-card *ngIf="!routine">
        <p>No tienes una rutina asignada aún.</p>
    </mat-card>

</div>
